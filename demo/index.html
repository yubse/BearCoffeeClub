<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bear Cafe Game</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <section class="playgame-section">
        <div id="start-screen">
            <img id="start-image-base"
                src="https://cdn.shopify.com/s/files/1/0651/5186/0943/files/6_2e9607de-e8fb-4375-8e8c-ea7f98f76fc0.png?v=1776151499"
                alt="">
            <img id="start-image-flash" class="hide" alt="">
        </div>

        <div id="char-select-screen" class="hide">
            <img id="char-select-bg" alt="">
            <div class="char-ui-container">
                <div class="char-title">请选择你的形象</div>
                <br>
                <div class="char-options">
                    <div id="char-card-char1" class="char-card selected" data-char="char1">
                        <img id="preview-char1" alt="形象1">
                    </div>
                    <div id="char-card-char2" class="char-card" data-char="char2">
                        <img id="preview-char2" alt="形象2">
                    </div>
                </div>
                <div class="char-title" id="btn-confirm-char" style="cursor: pointer; margin-top: 10px;">确定 [按A]</div>
                <div class="char-title" style="font-size: 12px; color: #999;">* 确认后按SELECT查看背包 *</div>
            </div>
        </div>

        <div id="console">
            <div id="game-screen">
                <img id="scene-bg" alt=""
                    style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none;">
                <canvas id="gameCanvas" style="position: relative; z-index: 5;"></canvas>
                <div id="transition-overlay"></div>

                <div id="control-guide-screen" class="hide">
                    <img id="control-guide-img" alt="游戏键位说明">
                </div>

                <div id="dark-mask" class="hide" style="z-index: 10;"></div>

                <div id="inventory-screen" class="hide">
                    <img id="inv-dialogue-bg" alt="">
                    <div class="inv-avatar-box"><img id="inv-avatar" alt=""></div>
                    <div id="summon-hint" class="hide">三个物品已集齐，按 A 召唤咖神！</div>
                    <div id="inv-gain-message" class="hide"></div>

                    <div class="inv-items-container">
                        <div class="inv-item"><img id="inv-item-0" alt="">
                            <div class="inv-text" id="inv-text-0">???</div>
                        </div>
                        <div class="inv-item"><img id="inv-item-1" alt="">
                            <div class="inv-text" id="inv-text-1">???</div>
                        </div>
                        <div class="inv-item"><img id="inv-item-2" alt="">
                            <div class="inv-text" id="inv-text-2">???</div>
                        </div>
                    </div>
                </div>

                <div id="summon-screen" class="hide">
                    <div id="summon-content">
                        <img id="summon-bg" alt="">
                        <img id="summon-gif-img" alt="召唤咖神">
                        <div class="summon-text-group" id="summon-text-container">
                        </div>
                    </div>
                </div>

                <div id="dialogue-container" class="hide">
                    <img id="dialogue-bg" alt="">
                    <div id="close-dialogue">&times;</div>
                    <div id="name-tag"></div>
                    <div id="message-text"></div>
                    <img id="page-next-icon" class="hide" alt="">
                    <div id="choices-box" class="choice-list hide"></div>
                </div>

                <div id="summon-ending-screen" class="hide">
                    <div id="summon-name-panel" class="summon-ending-panel">
                        <div class="summon-ending-title">是谁唤醒了我？</div>
                        <div class="summon-ending-desc">请留下你的名字。</div>
                        <input id="summon-name-input" type="text" maxlength="12" placeholder="输入昵称" autocomplete="off">
                        <div class="summon-ending-hint">输入后按 A 确认</div>
                    </div>

                    <div id="summon-choice-panel" class="summon-ending-panel hide">
                        <div class="summon-ending-title">咖神记住了你的名字</div>
                        <div class="summon-ending-desc" id="summon-choice-name"></div>
                        <div class="summon-ending-choice-row">
                            <button type="button" class="summon-ending-choice selected"
                                data-ending-choice="share">分享</button>
                            <button type="button" class="summon-ending-choice"
                                data-ending-choice="wallpaper">壁纸</button>
                        </div>
                        <div class="summon-ending-hint">按左右选择，按 A 确认，按 B 关闭</div>
                    </div>

                    <div id="summon-share-panel" class="summon-card-panel hide">
                        <div class="summon-card-wrap">
                            <img id="summon-share-card-img" alt="分享图">
                            <div id="summon-share-name"></div>
                        </div>
                        <div id="summon-share-time-label" class="summon-share-time-label hide"></div>
                        <div class="summon-ending-hint">长按海报保存，按 B 返回选择</div>
                    </div>

                    <div id="summon-wallpaper-panel" class="summon-card-panel hide">
                        <div class="summon-wallpaper-title">咖神为你抽中了这张壁纸</div>
                        <div class="summon-card-wrap">
                            <img id="summon-wallpaper-img" alt="随机壁纸">
                        </div>
                        <div class="summon-ending-hint" style="color: #fffaf0;">长按壁纸保存，按 B 返回重新选择</div>
                    </div>
                </div>

            </div>

            <img id="console-shell" alt="">

            <div id="btn-b" class="touch-btn"></div>
            <div id="btn-select" class="touch-btn"></div>
            <div id="up" class="touch-btn"></div>
            <div id="down" class="touch-btn"></div>
            <div id="left" class="touch-btn"></div>
            <div id="right" class="touch-btn"></div>
            <div id="btn-a" class="touch-btn"></div>
        </div>


        <audio id="bgm" loop preload="auto">
            <source src="./static/audio/bgm.mp3" type="audio/mpeg">
        </audio>
    </section>

    <script src="./js/main.js" defer></script>
</body>

</html>
